{% extends "base.html" %}

{% block content %}

<!-- Header -->
<div class="repo-header">
  <div class="repo-title">
    <h2>{{name}}</h2>
    <span class="branch-badge">{{branch}}</span>
  </div>

  <div>
    <a class="btn" href="/repo/{{name}}?branch={{branch}}">
      Back
    </a>
  </div>
</div>

<!-- Commit list -->
<div class="commit-container">

  {% for c in commits %}
  <a href="/commit/{{name}}/{{c.hash}}" class="commit-link">

    <div class="commit-item">

      <div class="commit-message">
        {{c.message}}
      </div>

      <div class="commit-sub">
        <span class="commit-hash">{{c.hash}}</span>
        <span class="dot">•</span>
        <span class="commit-author">{{c.author}}</span>

        {% if c.time %}
        <span class="dot">•</span>
        <span class="commit-time">{{c.time}}</span>
        {% endif %}
      </div>

    </div>

  </a>
  {% endfor %}

  {% if not commits %}
  <div class="empty">No commits yet</div>
  {% endif %}

</div>

{% endblock %}
